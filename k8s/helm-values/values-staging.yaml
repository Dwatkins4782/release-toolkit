# =============================================================================
# Helm Values — Staging Environment
# =============================================================================
# Production-like configuration with reduced scale. TLS enabled, monitoring on.

global:
  environment: staging
  version: "0.0.0"
  imageRegistry: "registry.staging.myorg.com"

replicaCount: 2

image:
  repository: pos-platform/pos-service
  tag: "0.0.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: staging.pos-platform.myorg.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: pos-staging-tls
      hosts:
        - staging.pos-platform.myorg.com

env:
  - name: APP_ENV
    value: "staging"
  - name: LOG_LEVEL
    value: "info"
  - name: DB_HOST
    valueFrom:
      secretKeyRef:
        name: pos-db-credentials
        key: host

featureToggles:
  enabled: true
  sdkKey: "sdk-staging-placeholder"

monitoring:
  enabled: true
  dynatrace:
    enabled: true
    injectAgent: true
  prometheus:
    scrape: true
    port: 9090

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /health/live
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
