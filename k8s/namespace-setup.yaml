# =============================================================================
# Namespace Bootstrap — QA/Staging/Edge Environments
# =============================================================================
# Apply once to bootstrap namespaces with proper labels, resource quotas,
# limit ranges, and network policies.
#
# Usage: kubectl apply -f k8s/namespace-setup.yaml
# =============================================================================

---
# ── QA Namespace ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pos-qa
  labels:
    app: pos-platform
    environment: qa
    managed-by: release-toolkit

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pos-qa-quota
  namespace: pos-qa
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "30"
    services: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: pos-qa-limits
  namespace: pos-qa
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi

---
# ── Staging Namespace ────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pos-staging
  labels:
    app: pos-platform
    environment: staging
    managed-by: release-toolkit

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pos-staging-quota
  namespace: pos-staging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: pos-staging-limits
  namespace: pos-staging
spec:
  limits:
    - type: Container
      default:
        cpu: 1000m
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 256Mi

---
# ── Edge Namespace ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pos-edge
  labels:
    app: pos-platform
    environment: edge
    managed-by: release-toolkit

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pos-edge-quota
  namespace: pos-edge
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "20"

---
# ── Production Namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: pos-production
  labels:
    app: pos-platform
    environment: production
    managed-by: release-toolkit

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pos-prod-quota
  namespace: pos-production
spec:
  hard:
    requests.cpu: "32"
    requests.memory: 64Gi
    limits.cpu: "64"
    limits.memory: 128Gi
    pods: "200"
    services: "50"
