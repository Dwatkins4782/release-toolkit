# =============================================================================
# POS Platform Release Pipeline — GitHub Actions
# =============================================================================
# Equivalent to the GitLab CI pipeline for GitHub-based repositories.
# Triggered on push to main or manual workflow dispatch.

name: Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'auto'
        type: choice
        options: [auto, major, minor, patch]
      dry_run:
        description: 'Dry run (no actual deployment)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: read
  packages: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Stage 1: Validate ──
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for tag detection

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint scripts
        run: |
          pip install flake8
          flake8 scripts/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Validate configs
        run: |
          python -c "import yaml; yaml.safe_load(open('config/release-config.yaml'))"
          python -c "import yaml; yaml.safe_load(open('config/conventional-commits.yaml'))"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true

  # ── Stage 2: Security Scan ──
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Stage 3: Version & Release Notes ──
  version-and-notes:
    name: Calculate Version & Generate Notes
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Calculate version
        id: version
        run: |
          BUMP="${{ github.event.inputs.bump_type || 'auto' }}"
          python scripts/version.py --bump $BUMP --output version-summary.json --dry-run
          VERSION=$(python -c "import json; print(json.load(open('version-summary.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: $VERSION"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python scripts/release_notes.py --version $VERSION --format md --output release-notes.md
          python scripts/release_notes.py --version $VERSION --format json --output release-notes.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            version-summary.json
            release-notes.md
            release-notes.json

  # ── Stage 4: Tag Work Items ──
  tag-work-items:
    name: Tag Work Items
    runs-on: ubuntu-latest
    needs: version-and-notes
    if: github.event.inputs.dry_run != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Tag Jira tickets
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          python scripts/tag_work_items.py \
            --version ${{ needs.version-and-notes.outputs.version }} \
            --provider jira \
            --output tagged-items.json || true
        continue-on-error: true

  # ── Stage 5: QA Bridge ──
  qa-bridge:
    name: QA Bridge - Handoff
    runs-on: ubuntu-latest
    needs: version-and-notes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare QA handoff
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          QA_AUTOMATION_API_KEY: ${{ secrets.QA_AUTOMATION_API_KEY }}
          FEATURE_TOGGLE_API_KEY: ${{ secrets.FEATURE_TOGGLE_API_KEY }}
        run: |
          python scripts/prepare_qa_handoff.py \
            --version ${{ needs.version-and-notes.outputs.version }} \
            --env qa \
            --output-dir ./qa-artifacts \
            --skip-deploy

      - name: Upload QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts
          path: qa-artifacts/

  # ── Stage 6: Create GitHub Release ──
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-and-notes, qa-bridge]
    if: github.event.inputs.dry_run != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create Git tag
        run: |
          VERSION="${{ needs.version-and-notes.outputs.version }}"
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-and-notes.outputs.version }}
          name: Release ${{ needs.version-and-notes.outputs.version }}
          body_path: release-notes.md
          files: |
            version-summary.json
            release-notes.json
          draft: false
          prerelease: false

  # ── Stage 7: Notify ──
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [create-release, version-and-notes]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python -c "
          from scripts.utils.notification import send_slack, format_release_notification
          import os
          version = '${{ needs.version-and-notes.outputs.version }}'
          payload = format_release_notification(
              version, 'Release $version deployed successfully',
              'production', pipeline_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          )
          send_slack(os.environ.get('SLACK_WEBHOOK_URL', ''), payload)
          " || true
